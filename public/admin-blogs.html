<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Blog Management</title>
  <link rel="stylesheet" href="style.css?v=5">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f7fa; }
    
    .admin-container {
      display: flex;
      min-height: 100vh;
    }
    
    .admin-sidebar {
      width: 260px;
      background: linear-gradient(135deg, #0d2238 0%, #1a3a52 100%);
      color: #fff;
      padding: 30px 0;
      position: fixed;
      height: 100vh;
      overflow-y: auto;
    }
    
    .admin-sidebar h3 {
      padding: 0 20px 20px;
      font-size: 1.3rem;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      margin-bottom: 20px;
    }
    
    .admin-sidebar a, .admin-sidebar button {
      display: block;
      width: 100%;
      padding: 12px 20px;
      color: #a8c4e0;
      text-decoration: none;
      border: none;
      background: none;
      cursor: pointer;
      text-align: left;
      font-size: 14px;
      transition: all 0.3s;
    }
    
    .admin-sidebar a:hover, .admin-sidebar button:hover,
    .admin-sidebar a.active, .admin-sidebar button.active {
      background: rgba(19,96,163,0.3);
      color: #fff;
      border-left: 3px solid #1360a3;
      padding-left: 17px;
    }
    
    .admin-content {
      margin-left: 260px;
      flex: 1;
      padding: 30px;
    }
    
    .admin-header {
      background: #fff;
      padding: 20px 30px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(15,38,72,0.1);
      margin-bottom: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .admin-header h1 {
      font-size: 1.8rem;
      color: #0d2238;
    }
    
    .btn-primary {
      background: #1360a3;
      color: #fff;
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.3s;
    }
    
    .btn-primary:hover { background: #0d4a7f; }
    .btn-primary.small { padding: 8px 12px; font-size: 12px; }
    .btn-danger { background: #dc3545; }
    .btn-danger:hover { background: #c82333; }
    
    .blog-list {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(15,38,72,0.1);
      overflow: hidden;
    }
    
    .blog-list-header {
      background: #f8f9fa;
      padding: 20px 30px;
      border-bottom: 1px solid #e9ecef;
      font-weight: 600;
      color: #495057;
      display: grid;
      grid-template-columns: 2fr 1.5fr 1fr 1fr 1.5fr;
      gap: 15px;
      align-items: center;
    }
    
    .blog-item {
      padding: 20px 30px;
      border-bottom: 1px solid #e9ecef;
      display: grid;
      grid-template-columns: 2fr 1.5fr 1fr 1fr 1.5fr;
      gap: 15px;
      align-items: center;
    }
    
    .blog-item:last-child { border-bottom: none; }
    .blog-item:hover { background: #f8f9fa; }
    
    .blog-title {
      font-weight: 600;
      color: #0d2238;
      word-break: break-word;
    }
    
    .blog-category {
      display: inline-block;
      background: #e8f0f9;
      color: #1360a3;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    
    .status-published {
      background: #d4edda;
      color: #155724;
    }
    
    .status-draft {
      background: #fff3cd;
      color: #856404;
    }
    
    .action-buttons {
      display: flex;
      gap: 8px;
    }
    
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.5);
    }
    
    .modal-content {
      background-color: #fff;
      margin: 5% auto;
      padding: 0;
      border-radius: 10px;
      width: 90%;
      max-width: 600px;
      box-shadow: 0 5px 30px rgba(0,0,0,0.3);
    }
    
    .modal-header {
      padding: 20px 30px;
      border-bottom: 1px solid #e9ecef;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .modal-header h2 {
      color: #0d2238;
      font-size: 1.5rem;
    }
    
    .close-modal {
      background: none;
      border: none;
      font-size: 28px;
      cursor: pointer;
      color: #999;
    }
    
    .modal-body {
      padding: 30px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #495057;
      font-size: 14px;
    }
    
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
    }
    
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: #1360a3;
      box-shadow: 0 0 0 3px rgba(19,96,163,0.1);
    }
    
    .form-group textarea {
      resize: vertical;
      min-height: 120px;
    }
    
    .modal-footer {
      padding: 20px 30px;
      border-top: 1px solid #e9ecef;
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    
    .alert {
      padding: 12px 20px;
      border-radius: 6px;
      margin-bottom: 20px;
      display: none;
    }
    
    .alert.show { display: block; }
    .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    
    .empty-state {
      text-align: center;
      padding: 60px 30px;
      color: #999;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: #999;
    }
    
    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #1360a3;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }
    
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    @media (max-width: 768px) {
      .admin-sidebar { position: static; width: 100%; height: auto; }
      .admin-content { margin-left: 0; }
      .blog-list-header { display: none; }
      .blog-item { grid-template-columns: 1fr; gap: 10px; padding: 15px; }
    }
  </style>
</head>
<body>
  <div class="admin-container">
    <div class="admin-sidebar">
      <h3>Admin Panel</h3>
      <a href="../admin.html">Dashboard</a>
      <button class="active">Blog Management</button>
      <hr style="border: none; border-top: 1px solid rgba(255,255,255,0.1); margin: 15px 0;">
      <button id="logoutBtn" style="color: #ff6b6b;">Logout</button>
    </div>

    <div class="admin-content">
      <div class="admin-header">
        <h1>Blog Management</h1>
        <button class="btn-primary" onclick="openAddModal()">+ Add New Blog</button>
      </div>

      <div id="alert" class="alert"></div>

      <div id="blogListContainer" class="blog-list">
        <div class="loading">
          <div class="spinner"></div>
          <p>Loading blogs...</p>
        </div>
      </div>
    </div>
  </div>

  <div id="blogModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">Add New Blog</h2>
        <button class="close-modal" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <form id="blogForm" onsubmit="saveBlog(event)">
          <div class="form-group">
            <label for="blogTitle">Blog Title *</label>
            <input type="text" id="blogTitle" required placeholder="Enter blog title">
          </div>

          <div class="form-group">
            <label for="blogCategory">Category *</label>
            <select id="blogCategory" required>
              <option value="">Select Category</option>
              <option value="Gaming">Gaming</option>
              <option value="Keyboards">Keyboards</option>
              <option value="Mice">Mice</option>
              <option value="Headphones">Headphones</option>
              <option value="Tips &amp; Tricks">Tips &amp; Tricks</option>
              <option value="Reviews">Reviews</option>
            </select>
          </div>

          <div class="form-group">
            <label for="blogExcerpt">Excerpt *</label>
            <input type="text" id="blogExcerpt" required placeholder="Short preview text">
          </div>

          <div class="form-group">
            <label for="blogContent">Content *</label>
            <textarea id="blogContent" required placeholder="Write your blog content here..."></textarea>
          </div>

          <div class="form-group">
            <label for="blogAuthor">Author</label>
            <input type="text" id="blogAuthor" placeholder="Author name" value="Admin">
          </div>

          <div class="form-group">
            <label for="blogTags">Tags (comma-separated)</label>
            <input type="text" id="blogTags" placeholder="tag1, tag2, tag3">
          </div>

          <div class="form-group">
            <label for="blogStatus">Status</label>
            <select id="blogStatus">
              <option value="draft">Draft</option>
              <option value="published">Published</option>
            </select>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn-primary" style="background: #999;" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" onclick="saveBlog(event)">Save Blog</button>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '/api';
    let currentBlogId = null;
    let authToken = localStorage.getItem('authToken');

    if (!authToken) {
      alert('Please login first');
      window.location.href = 'login.html';
    }

    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('authToken');
      window.location.href = 'login.html';
    });

    document.addEventListener('DOMContentLoaded', loadBlogs);

    async function loadBlogs() {
      try {
        const response = await fetch(API_BASE + '/admin/blogs', {
          headers: { 'X-Auth-Token': authToken }
        });

        if (response.status === 401) {
          localStorage.removeItem('authToken');
          window.location.href = 'login.html';
          return;
        }

        const blogs = await response.json();
        displayBlogs(blogs);
      } catch (error) {
        showAlert('Error loading blogs: ' + error.message, 'error');
      }
    }

    function displayBlogs(blogs) {
      const container = document.getElementById('blogListContainer');

      if (!blogs || blogs.length === 0) {
        container.innerHTML = '<div class="empty-state"><p>No blogs yet. Click "Add New Blog" to create one.</p></div>';
        return;
      }

      let html = '<div class="blog-list-header"><div>Title</div><div>Category</div><div>Status</div><div>Views</div><div>Actions</div></div>';

      blogs.forEach(blog => {
        html += '<div class="blog-item">' +
          '<div class="blog-title">' + (blog.title || '') + '</div>' +
          '<div><span class="blog-category">' + (blog.category || '') + '</span></div>' +
          '<div><span class="status-badge status-' + (blog.status || '') + '">' + (blog.status || '') + '</span></div>' +
          '<div>' + (blog.views || 0) + '</div>' +
          '<div class="action-buttons">' +
          '<button class="btn-primary small" onclick="editBlog(\'' + blog._id + '\')">Edit</button>' +
          '<button class="btn-primary small btn-danger" onclick="deleteBlog(\'' + blog._id + '\')">Delete</button>' +
          '</div></div>';
      });

      container.innerHTML = html;
    }

    function openAddModal() {
      currentBlogId = null;
      document.getElementById('modalTitle').textContent = 'Add New Blog';
      document.getElementById('blogForm').reset();
      document.getElementById('blogModal').style.display = 'block';
    }

    async function editBlog(blogId) {
      try {
        const response = await fetch(API_BASE + '/blogs/' + blogId, {
          headers: { 'X-Auth-Token': authToken }
        });

        if (!response.ok) throw new Error('Failed to load blog');

        const blog = await response.json();
        currentBlogId = blog._id;

        document.getElementById('modalTitle').textContent = 'Edit Blog';
        document.getElementById('blogTitle').value = blog.title;
        document.getElementById('blogCategory').value = blog.category;
        document.getElementById('blogExcerpt').value = blog.excerpt;
        document.getElementById('blogContent').value = blog.content;
        document.getElementById('blogAuthor').value = blog.author;
        document.getElementById('blogTags').value = (blog.tags || []).join(', ');
        document.getElementById('blogStatus').value = blog.status;

        document.getElementById('blogModal').style.display = 'block';
      } catch (error) {
        showAlert('Error: ' + error.message, 'error');
      }
    }

    async function saveBlog(event) {
      event.preventDefault();

      const blogData = {
        title: document.getElementById('blogTitle').value,
        category: document.getElementById('blogCategory').value,
        excerpt: document.getElementById('blogExcerpt').value,
        content: document.getElementById('blogContent').value,
        author: document.getElementById('blogAuthor').value,
        tags: document.getElementById('blogTags').value.split(',').map(t => t.trim()).filter(t => t),
        status: document.getElementById('blogStatus').value
      };

      try {
        let response;

        if (currentBlogId) {
          response = await fetch(API_BASE + '/admin/blogs/' + currentBlogId, {
            method: 'PUT',
            headers: { 'X-Auth-Token': authToken, 'Content-Type': 'application/json' },
            body: JSON.stringify(blogData)
          });
        } else {
          response = await fetch(API_BASE + '/admin/blogs', {
            method: 'POST',
            headers: { 'X-Auth-Token': authToken, 'Content-Type': 'application/json' },
            body: JSON.stringify(blogData)
          });
        }

        if (!response.ok) throw new Error('Failed to save blog');

        showAlert(currentBlogId ? 'Blog updated!' : 'Blog created!', 'success');
        closeModal();
        loadBlogs();
      } catch (error) {
        showAlert('Error: ' + error.message, 'error');
      }
    }

    async function deleteBlog(blogId) {
      if (!confirm('Delete this blog?')) return;

      try {
        const response = await fetch(API_BASE + '/admin/blogs/' + blogId, {
          method: 'DELETE',
          headers: { 'X-Auth-Token': authToken }
        });

        if (!response.ok) throw new Error('Failed to delete');

        showAlert('Blog deleted!', 'success');
        loadBlogs();
      } catch (error) {
        showAlert('Error: ' + error.message, 'error');
      }
    }

    function closeModal() {
      document.getElementById('blogModal').style.display = 'none';
      currentBlogId = null;
    }

    function showAlert(message, type) {
      const alert = document.getElementById('alert');
      alert.className = 'alert show alert-' + type;
      alert.textContent = message;
      setTimeout(() => alert.classList.remove('show'), 3000);
    }

    window.onclick = function(event) {
      const modal = document.getElementById('blogModal');
      if (event.target === modal) modal.style.display = 'none';
    }
  </script>
</body>
</html>
