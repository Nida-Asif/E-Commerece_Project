<!DOCTYPE html><html><head><meta charset='UTF-8'><title>Blog</title><link rel='stylesheet' href='style.css'></head><body><div id='blog'></div><script>
async function load(){const slug=new URLSearchParams(location.search).get('slug');const r=await fetch('/api/blogs/'+slug);const b=await r.json();document.title=b.seoTitle||b.title;document.getElementById('blog').innerHTML=`<div style="max-width:900px;margin:40px auto;padding:20px"><h1>${b.title}</h1><p>${b.excerpt||''}</p><div>${b.content||''}</div></div>`;}load();
</script></body></html>
